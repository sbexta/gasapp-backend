services:
  postgres:
    image: postgres:16-alpine
    container_name: gasapp-postgres
    environment:
      POSTGRES_DB: gasapp
      POSTGRES_USER: gasapp
      POSTGRES_PASSWORD: gasapp123
    ports:
      - "5432:5432"
    volumes:
      - gasapp-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: gasapp-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  gasapp-postgres-data:
